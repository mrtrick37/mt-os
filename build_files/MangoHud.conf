# KythOS default MangoHud configuration
# System-wide defaults — users can override in ~/.config/MangoHud/MangoHud.conf
# or per-app in ~/.config/MangoHud/<AppName>.conf

# ── What to show ────────────────────────────────────────────────────────────────
fps
frametime
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
vram
cpu_stats
cpu_temp
cpu_mhz
arch
vulkan_driver
wine

# ── Load-based color coding ──────────────────────────────────────────────────────
# GPU and CPU bars change color (green → yellow → red) as load increases.
gpu_load_change=1
cpu_load_change=1

# FPS coloring: green above 144, yellow 60–144, red below 60.
fps_color_change=1
fps_value=60,144

# ── Appearance ───────────────────────────────────────────────────────────────────
background_alpha=0.4
font_size=24
position=top-left
round_corners=5

# ── Toggle ───────────────────────────────────────────────────────────────────────
toggle_hud=Shift_R+F12
