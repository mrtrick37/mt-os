# Kyth default vkBasalt configuration
# vkBasalt is a Vulkan post-processing layer. It only activates when you
# explicitly enable it per-game, e.g. in Steam launch options:
#   ENABLE_VKBASALT=1 %command%
#
# This file defines what happens when it is enabled.
# Users can override with ~/.config/vkBasalt/vkBasalt.conf
# or point to a custom file via VKBASALT_CONFIG_FILE.

# ── Effect chain ────────────────────────────────────────────────────────────────
# Default: CAS (Contrast Adaptive Sharpening) — subtle sharpening that makes
# textures crisp without blurring or significant performance cost.
# To stack effects, comma-separate them: effects = cas:smaa
effects = cas

# ── CAS settings ────────────────────────────────────────────────────────────────
# 0.0 = no sharpening, 1.0 = maximum. 0.4 is a natural-looking default.
casSharpness = 0.4

# ── Other available effects (uncomment to use instead of or alongside CAS) ──────
# SMAA — spatial anti-aliasing, good for older games without TAA.
#   smaaQuality = ultra    # low | medium | high | ultra
#
# FXAA — fast approximate anti-aliasing, lighter than SMAA.
#
# Deband — removes colour banding in dark gradients.
#   debandRange = 64
#   debandIterations = 4
#   debandThreshold = 64
#   debandOffset = 0

# ── Toggle ───────────────────────────────────────────────────────────────────────
# Press this key in-game to toggle vkBasalt on/off without restarting.
toggleKey = Home
