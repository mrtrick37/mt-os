<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <!-- Deep background gradient — Tokyo Night sky -->
    <radialGradient id="bg" cx="45%" cy="55%" r="75%">
      <stop offset="0%"   stop-color="#1e2030"/>
      <stop offset="60%"  stop-color="#1a1b26"/>
      <stop offset="100%" stop-color="#13141e"/>
    </radialGradient>

    <!-- Glow for each beam -->
    <filter id="beam-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Logo glow -->
    <filter id="logo-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="22" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Amber spark glow -->
    <filter id="spark-glow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="28" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>

    <!-- Beam gradients — fade from edge to meeting point -->
    <linearGradient id="beam-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7aa2f7" stop-opacity="0.0"/>
      <stop offset="70%"  stop-color="#7aa2f7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="beam-purple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#bb9af7" stop-opacity="0.0"/>
      <stop offset="70%"  stop-color="#bb9af7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="beam-teal" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#73daca" stop-opacity="0.0"/>
      <stop offset="70%"  stop-color="#73daca" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#73daca" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- ── Background ──────────────────────────────────────────────────────────── -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- ── Subtle dot grid ─────────────────────────────────────────────────────── -->
  <!-- Very faint grid of dots to add texture without distracting -->
  <g opacity="0.045" fill="#7aa2f7">
    <circle cx="160"  cy="135"  r="1.5"/><circle cx="320"  cy="135"  r="1.5"/><circle cx="480"  cy="135"  r="1.5"/>
    <circle cx="640"  cy="135"  r="1.5"/><circle cx="800"  cy="135"  r="1.5"/><circle cx="960"  cy="135"  r="1.5"/>
    <circle cx="1120" cy="135"  r="1.5"/><circle cx="1280" cy="135"  r="1.5"/><circle cx="1440" cy="135"  r="1.5"/>
    <circle cx="1600" cy="135"  r="1.5"/><circle cx="1760" cy="135"  r="1.5"/>
    <circle cx="160"  cy="270"  r="1.5"/><circle cx="320"  cy="270"  r="1.5"/><circle cx="480"  cy="270"  r="1.5"/>
    <circle cx="640"  cy="270"  r="1.5"/><circle cx="800"  cy="270"  r="1.5"/><circle cx="960"  cy="270"  r="1.5"/>
    <circle cx="1120" cy="270"  r="1.5"/><circle cx="1280" cy="270"  r="1.5"/><circle cx="1440" cy="270"  r="1.5"/>
    <circle cx="1600" cy="270"  r="1.5"/><circle cx="1760" cy="270"  r="1.5"/>
    <circle cx="160"  cy="405"  r="1.5"/><circle cx="320"  cy="405"  r="1.5"/><circle cx="480"  cy="405"  r="1.5"/>
    <circle cx="640"  cy="405"  r="1.5"/><circle cx="800"  cy="405"  r="1.5"/><circle cx="960"  cy="405"  r="1.5"/>
    <circle cx="1120" cy="405"  r="1.5"/><circle cx="1280" cy="405"  r="1.5"/><circle cx="1440" cy="405"  r="1.5"/>
    <circle cx="1600" cy="405"  r="1.5"/><circle cx="1760" cy="405"  r="1.5"/>
    <circle cx="160"  cy="540"  r="1.5"/><circle cx="320"  cy="540"  r="1.5"/><circle cx="480"  cy="540"  r="1.5"/>
    <circle cx="640"  cy="540"  r="1.5"/><circle cx="800"  cy="540"  r="1.5"/><circle cx="960"  cy="540"  r="1.5"/>
    <circle cx="1120" cy="540"  r="1.5"/><circle cx="1280" cy="540"  r="1.5"/><circle cx="1440" cy="540"  r="1.5"/>
    <circle cx="1600" cy="540"  r="1.5"/><circle cx="1760" cy="540"  r="1.5"/>
    <circle cx="160"  cy="675"  r="1.5"/><circle cx="320"  cy="675"  r="1.5"/><circle cx="480"  cy="675"  r="1.5"/>
    <circle cx="640"  cy="675"  r="1.5"/><circle cx="800"  cy="675"  r="1.5"/><circle cx="960"  cy="675"  r="1.5"/>
    <circle cx="1120" cy="675"  r="1.5"/><circle cx="1280" cy="675"  r="1.5"/><circle cx="1440" cy="675"  r="1.5"/>
    <circle cx="1600" cy="675"  r="1.5"/><circle cx="1760" cy="675"  r="1.5"/>
    <circle cx="160"  cy="810"  r="1.5"/><circle cx="320"  cy="810"  r="1.5"/><circle cx="480"  cy="810"  r="1.5"/>
    <circle cx="640"  cy="810"  r="1.5"/><circle cx="800"  cy="810"  r="1.5"/><circle cx="960"  cy="810"  r="1.5"/>
    <circle cx="1120" cy="810"  r="1.5"/><circle cx="1280" cy="810"  r="1.5"/><circle cx="1440" cy="810"  r="1.5"/>
    <circle cx="1600" cy="810"  r="1.5"/><circle cx="1760" cy="810"  r="1.5"/>
    <circle cx="160"  cy="945"  r="1.5"/><circle cx="320"  cy="945"  r="1.5"/><circle cx="480"  cy="945"  r="1.5"/>
    <circle cx="640"  cy="945"  r="1.5"/><circle cx="800"  cy="945"  r="1.5"/><circle cx="960"  cy="945"  r="1.5"/>
    <circle cx="1120" cy="945"  r="1.5"/><circle cx="1280" cy="945"  r="1.5"/><circle cx="1440" cy="945"  r="1.5"/>
    <circle cx="1600" cy="945"  r="1.5"/><circle cx="1760" cy="945"  r="1.5"/>
  </g>

  <!-- ── Three atmospheric beams converging at center ──────────────────────── -->
  <!-- Blue beam — from upper-left -->
  <polygon points="0,0  480,0  960,540  0,540"
           fill="url(#beam-blue)" opacity="0.5"/>
  <!-- Purple beam — from upper-right -->
  <polygon points="1920,0  1440,0  960,540  1920,540"
           fill="url(#beam-purple)" opacity="0.5"/>
  <!-- Teal beam — from bottom -->
  <polygon points="640,1080  1280,1080  960,540"
           fill="url(#beam-teal)" opacity="0.5"/>

  <!-- ── Thin accent lines following the beams ─────────────────────────────── -->
  <line x1="0" y1="0" x2="960" y2="540"
        stroke="#7aa2f7" stroke-width="1" opacity="0.2"/>
  <line x1="1920" y1="0" x2="960" y2="540"
        stroke="#bb9af7" stroke-width="1" opacity="0.2"/>
  <line x1="960" y1="1080" x2="960" y2="540"
        stroke="#73daca" stroke-width="1" opacity="0.2"/>

  <!-- ── Kyth logo — centered ───────────────────────────────────────────────── -->
  <!-- Scaled version of kyth-logo.svg, centered at (960, 520) -->
  <!-- Logo viewBox is 512×512; we render it at ~160×160 centered -->
  <g transform="translate(880, 440)" filter="url(#logo-glow)">
    <!-- Background circle (faint) -->
    <circle cx="80" cy="80" r="72" fill="#1e2030" opacity="0.7"/>

    <!-- Figure 1 — blue, upright -->
    <line x1="54.6" y1="140.6" x2="54.6" y2="27.5"
          stroke="#7aa2f7" stroke-width="16.9" stroke-linecap="round"/>
    <circle cx="54.6" cy="17.2" r="12.5" fill="#7aa2f7"/>

    <!-- Figure 2 — purple, upper-right -->
    <line x1="122.5" y1="26.9" x2="54.6" y2="82.0"
          stroke="#bb9af7" stroke-width="16.9" stroke-linecap="round"/>
    <circle cx="130.6" cy="19.4" r="12.5" fill="#bb9af7"/>

    <!-- Figure 3 — teal, lower-right -->
    <line x1="122.5" y1="137.5" x2="54.6" y2="82.0"
          stroke="#73daca" stroke-width="16.9" stroke-linecap="round"/>
    <circle cx="130.6" cy="145.0" r="12.5" fill="#73daca"/>

    <!-- Amber meeting point -->
    <circle cx="54.6" cy="82.0" r="10.0" fill="#e0af68" opacity="0.35"
            filter="url(#spark-glow)"/>
    <circle cx="54.6" cy="82.0" r="5.6"  fill="#e0af68"/>
  </g>

  <!-- ── "kyth" wordmark ────────────────────────────────────────────────────── -->
  <text x="960" y="650"
        font-family="'DejaVu Sans', 'Liberation Sans', sans-serif"
        font-size="38"
        font-weight="300"
        letter-spacing="18"
        fill="#a9b1d6"
        opacity="0.75"
        text-anchor="middle">kyth</text>

  <!-- ── Vignette overlay ───────────────────────────────────────────────────── -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
