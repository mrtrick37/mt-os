---
# Forge Calamares installer — step-by-step wizard configuration.
#
# Wizard flow:
#   Welcome  →  Select Disk (partition)  →  [exec: partition + forge-predisksetup + bootc install]  →  Finish

modules-search: [local, /usr/lib/calamares/modules]

sequence:
  - show:
      - welcome
      - partition
  - exec:
      - partition
      - forge-predisksetup
      - shellprocess@forge-install
  - show:
      - finished

branding: forge

# Confirm before running exec phase
prompt-install: true

# Prevent cancel during install (could leave disk partially written)
disable-cancel-during-exec: true
