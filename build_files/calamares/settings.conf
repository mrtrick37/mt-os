---
# Forge Calamares installer — step-by-step wizard configuration.
#
# Wizard flow:
#   Welcome  →  Timezone  →  Select Disk (partition)  →  [exec: partition + mount + bootc install]  →  Finish
#
# Note: forge-predisksetup (Python jobmodule) is NOT used here because Fedora's
# Calamares package is not built with Python module support.  Instead the mount
# module mounts the new partitions under /tmp/calamares-root, and
# forge-calamares-install.sh derives the target disk from those mounts before
# unmounting and handing off to 'bootc install to-disk'.
#
# dont-chroot: true — Forge installs via 'bootc install to-disk' rather than
# setting up a chroot.
# The mount module is intentionally omitted from exec: mounting the new partition
# to /tmp/calamares-root would set rootMountPoint in globalStorage, causing
# Calamares to run a pre-exec sanity check (chroot /tmp/calamares-root /usr/bin/true)
# that fails because the blank formatted partition has no /bin/sh inside it.
# Instead, forge-calamares-install receives the disk via @@bootLoaderInstallPath@@.

modules-search: [local, /usr/lib/calamares/modules]

dont-chroot: true

# Calamares 3.3+ requires module@instance entries to be explicitly declared here.
# Without this block, shellprocess@forge-install falls back to the default
# shellprocess.conf installed by the RPM (which calls /usr/local/bin/slowloris).
instances:
  - id:     forge-install
    module: shellprocess
    config: shellprocess@forge-install.conf

sequence:
  - show:
      - welcome
      - locale
      - partition
  - exec:
      - partition
      - shellprocess@forge-install
  - show:
      - finished

branding: forge

# Confirm before running exec phase
prompt-install: true

# Prevent cancel during install (could leave disk partially written)
disable-cancel-during-exec: true
