---
# Partition module configuration for Kyth.
#
# NOTE: The partition module is used only for the disk-selection UI and to
# populate globalStorage with the target disk path.  kyth-bootcinstall wipes
# and repartitions the disk itself (EFI 512 MiB FAT32 + XFS root) using
# 'bootc install to-filesystem', so whatever Calamares formats here is
# immediately discarded.

efiSystemPartitionSize:  512MiB
efiSystemPartitionName:  "EFI System Partition"

# kyth-bootcinstall formats the root as XFS; this value is unused but must
# be set to something Calamares accepts.
defaultFileSystemType:   xfs
availableFileSystemTypes:
    - xfs

# No swap — bootc manages the installed system layout.
userSwapChoices:
    - none
initialSwapChoice: none

# Default to "erase entire disk" — the simplest and only supported mode.
initialPartitioningChoice: erase
