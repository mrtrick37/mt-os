---
# Partition module configuration for Kyth.
#
# NOTE: Calamares partitions the disk here, but kyth-bootcinstall (which runs
# next) calls 'bootc install to-disk', which completely wipes and repartitions
# the disk itself. The partition module is used here solely to provide the
# disk-selection UI and to populate globalStorage with the target disk path
# (bootLoaderInstallPath) and the chroot mount point (rootMountPoint) that
# kyth-bootcinstall reads before unmounting and handing control to bootc.

efiSystemPartitionSize:  300MiB
efiSystemPartitionName:  "EFI System Partition"

defaultFileSystemType:   btrfs
availableFileSystemTypes:
    - ext4
    - btrfs

# No swap — bootc manages the installed system layout.
userSwapChoices:
    - none
initialSwapChoice: none

# Default to "erase entire disk" — the simplest and only supported mode.
initialPartitioningChoice: erase
