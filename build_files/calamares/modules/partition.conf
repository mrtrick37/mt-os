---
# Forge partition module — disk selection only (erase mode).
# The actual disk layout is handled entirely by 'bootc install to-disk';
# the partition module is used only to let the user pick a target disk
# and to record that choice in globalStorage (bootLoaderInstallPath).

efiSystemPartitionSize:       300
efiSystemPartitionName:       "EFI System Partition"
efiSystemPartitionMountPoint: "/boot/efi"

defaultFileSystemType:    "ext4"
availableFileSystemTypes: ["ext4"]

# Default to erase-disk (automatic) mode.
# Manual partitioning is available for advanced users; note that
# 'bootc install to-disk' will repartition the selected disk regardless
# of what is configured here — use GParted (on the live desktop) for
# resizing existing partitions before running the installer.
initialPartitioningChoice: erase
initialSwapChoice:         suspend
allowManualPartitioning:   true

# Minimum disk size (GiB) required for Forge
requiredStorage: 20
