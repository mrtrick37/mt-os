---
userShell: /bin/bash

defaultGroups:
    - name:      wheel
      mustExist: true
      addUsers:  true

doAutologin:      false
setRootPassword:  false

# Collect hostname on the users page.
hostname:
    location:       /etc/hostname
    writeHostsFile: true
    template:       "kyth"

# Require a real password during install so deployed systems do not start with
# trivially guessable credentials.
passwordRequirements:
    minLength:  12
    maxLength:  -1

allowWeakPasswords: false
