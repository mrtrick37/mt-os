---
# Forge locale/timezone configuration.
#
# Shows the timezone selection page (interactive world map + region/zone dropdowns).
# The user's selection is stored in globalStorage["timezone"] and passed to
# forge-calamares-install via @@timezone@@ substitution in shellprocess@forge-install.conf.
#
# After 'bootc install to-disk' completes, forge-calamares-install.sh mounts the
# installed root and writes the localtime symlink to the ostree deployment's /etc.

# Default region and zone shown when the page opens.
region: "America"
zone: "New_York"

# GeoIP: auto-detect timezone from the live session's IP address.
# Comment out if the live environment has no network access.
geoip:
    style: "json"
    url:   "https://geoip.kde.org/v1/calamares"
