---
# Runs the Forge bootc installation.
# The target disk is derived from what the mount module mounted at /tmp/calamares-root.
# The timezone is passed via @@timezone@@ substitution from globalStorage (set by
# the locale module's show step).

dontChroot: true
timeout: 7200

script:
    # @@timezone@@ is replaced by Calamares with the value from globalStorage["timezone"]
    # (e.g. "America/New_York").  forge-calamares-install applies it to the installed root.
    - "/usr/bin/forge-calamares-install @@timezone@@"
