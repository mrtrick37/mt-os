name: Build Network Install ISO

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source image tag to pull at install time'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - testing

jobs:
  # ── Job 1: Build the live container and push to GHCR ─────────────────────────
  # Reuses the same Containerfile.live as the offline live ISO.
  # Pushed to GHCR so job 2 can pull it on a fresh runner with more disk.
  build-live-container:
    name: Build live container
    runs-on: ubuntu-latest
    permissions:
      packages: write

    outputs:
      image-ref: ${{ steps.push.outputs.image-ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push live container to GHCR
        id: push
        run: |
          BASE_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.source_tag || 'latest' }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build"
          docker buildx build \
            --tag "${IMAGE}" \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            -f build_files/Containerfile.live \
            --push \
            .
          echo "image-ref=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Flatten live container to a single layer
        # The live image inherits 100+ layers from the kyth base image.
        # docker pull in Job 2 hits Docker's 128-layer overlay2 limit before
        # it can even finish pulling. crane flatten squashes all layers into one
        # and pushes the result back to the same tag, so Job 2 can pull cleanly.
        run: |
          curl -sSfL "https://github.com/google/go-containerregistry/releases/download/v0.20.6/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin crane
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build"
          crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          crane flatten "${IMAGE}"

  # ── Job 2: Export rootfs, build squashfs + ISO, upload ───────────────────────
  # No OCI bundle step — significantly less disk pressure than the offline ISO.
  build-iso:
    name: Build ISO
    needs: build-live-container
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso squashfs-tools mtools dosfstools git \
            grub-common grub-pc-bin grub-efi-amd64-bin
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | sudo bash -s -- --to /usr/local/bin
          sudo ln -sf /usr/bin/grub-mkimage /usr/local/bin/grub2-mkimage
          sudo ln -sf /usr/bin/grub-mkfont  /usr/local/bin/grub2-mkfont

      - name: Pull and flatten live container
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          SOURCE_TAG="${{ inputs.source_tag || 'latest' }}"
          if [[ "${SOURCE_TAG}" == "latest" ]]; then
            LIVE_TAG="kyth-live:build"
          else
            LIVE_TAG="kyth-live:build-${SOURCE_TAG}"
          fi

          # Flatten to a single layer to avoid the 128-layer overlay2 limit.
          docker pull "${{ needs.build-live-container.outputs.image-ref }}"
          CID=$(docker create "${{ needs.build-live-container.outputs.image-ref }}" /bin/true)
          docker export "${CID}" | docker import - "${LIVE_TAG}"
          docker rm "${CID}"
          docker rmi "${{ needs.build-live-container.outputs.image-ref }}" || true

      - name: Ensure permissions and directories
        run: |
          mkdir -p output/netinstall-iso
          chmod -R 777 output
          chmod -R 777 build_files
          chmod +x build_files/build-netinstall-iso.sh

      - name: Build network install ISO
        # SKIP_REBUILD=1: live container was pre-built and imported above.
        # Prune Docker right after rootfs export to reclaim overlay2 space
        # before mksquashfs runs (no OCI bundle means less total disk pressure).
        env:
          SKIP_REBUILD: "1"
        run: |
          SOURCE_TAG="${{ inputs.source_tag || 'latest' }}"
          if [[ "${SOURCE_TAG}" == "latest" ]]; then
            LIVE_TAG="kyth-live:build"
          else
            LIVE_TAG="kyth-live:build-${SOURCE_TAG}"
          fi

          just build-netinstall-iso "${SOURCE_TAG}" &
          BUILD_PID=$!

          while kill -0 $BUILD_PID 2>/dev/null; do
            ROOTFS=$(find /var/tmp -maxdepth 2 -name rootfs -type d 2>/dev/null | head -1)
            if [[ -n "${ROOTFS}" && -f "${ROOTFS}/etc/os-release" ]]; then
              echo "==> Container exported — pruning Docker overlay2"
              docker rmi "${LIVE_TAG}" || true
              docker system prune -f || true
              break
            fi
            sleep 5
          done

          wait $BUILD_PID

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyth-netinstall-iso
          path: output/netinstall-iso/kyth-netinstall-${{ inputs.source_tag || 'latest' }}.iso
          if-no-files-found: error

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          ISO="output/netinstall-iso/kyth-netinstall-${{ inputs.source_tag || 'latest' }}.iso"
          aws s3 cp "${ISO}" \
            "s3://kyth-releases/$(basename ${ISO})" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --no-progress

      - name: Publish release notes to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_TAG="${{ inputs.source_tag || 'latest' }}"
          TAG="${{ inputs.source_tag == 'testing' && 'netinstall-testing' || 'netinstall-latest' }}"
          ISO_URL="https://pub-9a3cc72972ea44c4ae7504ee7cda1fa6.r2.dev/kyth-netinstall-${SOURCE_TAG}.iso"

          if [ "${SOURCE_TAG}" = "testing" ]; then
            TITLE="Kyth Network Install ISO — Testing"
            NOTES=$(printf 'Network installer built from the `testing` branch. Pulls the OS from the registry at install time — requires internet access.\n\n**Download:** [kyth-netinstall-testing.iso](%s)' "${ISO_URL}")
            PRERELEASE="--prerelease"
          else
            TITLE="Kyth Network Install ISO — Stable"
            NOTES=$(printf 'Network installer built from the `main` branch. Pulls the OS from the registry at install time — requires internet access.\n\n**Download:** [kyth-netinstall-latest.iso](%s)' "${ISO_URL}")
            PRERELEASE="--latest"
          fi

          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "${NOTES}" \
            ${PRERELEASE}
