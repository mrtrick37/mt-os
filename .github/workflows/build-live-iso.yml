name: Build Live ISO

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Source image tag to build ISO from'
        required: false
        default: 'latest'
        type: choice
        options:
          - latest
          - testing

jobs:
  # ── Job 1: Build the live container image and push it to GHCR ───────────────
  # Uses docker buildx (BuildKit) which:
  #   • Has no 128-layer overlay2 limit — no need to flatten the base image
  #   • Streams layers directly to GHCR with --push, storing nothing locally
  # This keeps local disk usage near-zero for the build job.
  build-live-container:
    name: Build live container
    runs-on: ubuntu-latest
    permissions:
      packages: write

    outputs:
      image-ref: ${{ steps.push.outputs.image-ref }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build and push live container directly to GHCR
        # BuildKit (docker buildx) has no 128-layer limit and --push streams
        # finished layers straight to GHCR — nothing is written to local storage.
        id: push
        run: |
          BASE_IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.source_tag || 'latest' }}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build"
          docker buildx build \
            --tag "${IMAGE}" \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            -f build_files/Containerfile.live \
            --push \
            .
          echo "image-ref=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Flatten live container to a single layer
        # The live image inherits 100+ layers from the kyth base image.
        # docker pull in Job 2 hits Docker's 128-layer overlay2 limit before
        # it can even finish pulling. crane flatten squashes all layers into one
        # and pushes the result back to the same tag, so Job 2 can pull cleanly.
        run: |
          curl -sSfL "https://github.com/google/go-containerregistry/releases/download/v0.20.6/go-containerregistry_Linux_x86_64.tar.gz" \
            | tar -xz -C /usr/local/bin crane
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:live-build"
          crane auth login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
          crane flatten "${IMAGE}"

  # ── Job 2: Pull the container, export rootfs, build squashfs + ISO ───────────
  # Fresh runner — Docker image is pulled then immediately removed after export
  # so overlay2 storage doesn't overlap with the large squashfs + ISO on disk.
  build-iso:
    name: Build ISO
    needs: build-live-container
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xorriso squashfs-tools mtools dosfstools git skopeo \
            grub-common grub-pc-bin grub-efi-amd64-bin
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
            | sudo bash -s -- --to /usr/local/bin
          sudo ln -sf /usr/bin/grub-mkimage /usr/local/bin/grub2-mkimage
          sudo ln -sf /usr/bin/grub-mkfont  /usr/local/bin/grub2-mkfont

      - name: Pull pre-built live container and base image
        # kyth-live:build  → used by build-live-iso.sh (skips the Docker build step)
        # localhost/kyth:latest is NOT pulled into Docker here — it has 100+ layers
        # and hits Docker's 128-layer overlay2 limit. Instead, SKOPEO_BASE is set
        # below so build-live-iso.sh copies the OCI bundle directly from GHCR via
        # skopeo (which has no layer limit), bypassing the Docker daemon entirely.
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # Pull the live container and flatten it into a single layer.
          # kyth:latest has 100+ layers; Containerfile.live adds more, so the
          # combined image exceeds Docker's 128-layer overlay2 limit.  Flattening
          # brings it to 1 layer so 'docker create' / 'docker export' succeed.
          # (skopeo, used later for the OCI bundle, reads layers directly and has
          # no such limit, so localhost/kyth:latest does NOT need flattening.)
          # docker import sets the image creation time to now, so kyth-live:build
          # will be newer than localhost/kyth:latest — staleness check passes.
          # Import with the tag name build-live-iso.sh expects:
          #   latest  → kyth-live:build
          #   testing → kyth-live:build-testing
          SOURCE_TAG="${{ inputs.source_tag || 'latest' }}"
          if [[ "${SOURCE_TAG}" == "latest" ]]; then
            LIVE_TAG="kyth-live:build"
          else
            LIVE_TAG="kyth-live:build-${SOURCE_TAG}"
          fi
          docker pull "${{ needs.build-live-container.outputs.image-ref }}"
          CID=$(docker create "${{ needs.build-live-container.outputs.image-ref }}" /bin/true)
          docker export "${CID}" | docker import - "${LIVE_TAG}"
          docker rm "${CID}"
          docker rmi "${{ needs.build-live-container.outputs.image-ref }}" || true

      - name: Ensure permissions and directories
        run: |
          mkdir -p output/live-iso
          chmod -R 777 output
          chmod -R 777 build_files
          chmod +x build_files/build-live-iso.sh

      - name: Build Live ISO
        # SKIP_REBUILD=1: kyth-live:build was pre-built in job 1 and imported
        # above — skip the staleness check so the script goes straight to
        # container export + squashfs + ISO without triggering a rebuild.
        # Prune Docker storage right after the container is exported to reclaim
        # the ~10 GB overlay2 footprint before squashfs runs.
        env:
          SKIP_REBUILD: "1"
          SKOPEO_BASE: "docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.source_tag || 'latest' }}"
        run: |
          SOURCE_TAG="${{ inputs.source_tag || 'latest' }}"
          if [[ "${SOURCE_TAG}" == "latest" ]]; then
            LIVE_TAG="kyth-live:build"
          else
            LIVE_TAG="kyth-live:build-${SOURCE_TAG}"
          fi

          just build-live-iso "${SOURCE_TAG}" &
          BUILD_PID=$!

          # Wait for the container export to finish (ROOTFS will appear),
          # then prune Docker to free overlay2 space before squashfs starts.
          while kill -0 $BUILD_PID 2>/dev/null; do
            ROOTFS=$(find /var/tmp -maxdepth 2 -name rootfs -type d 2>/dev/null | head -1)
            if [[ -n "${ROOTFS}" && -f "${ROOTFS}/etc/os-release" ]]; then
              echo "==> Container exported to ${ROOTFS} — pruning Docker overlay2"
              # Remove the live container image (already exported, no longer needed).
              # Do NOT prune -a: localhost/kyth:latest must survive for the skopeo
              # OCI bundle step that runs after squashfs.
              docker rmi "${LIVE_TAG}" || true
              docker system prune -f || true
              break
            fi
            sleep 5
          done

          wait $BUILD_PID

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyth-live-iso
          path: output/live-iso/kyth-live-${{ inputs.source_tag || 'latest' }}.iso
          if-no-files-found: error

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          ISO="output/live-iso/kyth-live-${{ inputs.source_tag || 'latest' }}.iso"
          aws s3 cp "${ISO}" \
            "s3://kyth-releases/$(basename ${ISO})" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --no-progress

      - name: Publish release notes to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SOURCE_TAG="${{ inputs.source_tag || 'latest' }}"
          TAG="${{ inputs.source_tag == 'testing' && 'iso-testing' || 'iso-latest' }}"
          ISO_URL="https://pub-9a3cc72972ea44c4ae7504ee7cda1fa6.r2.dev/kyth-live-${SOURCE_TAG}.iso"

          if [ "${SOURCE_TAG}" = "testing" ]; then
            TITLE="Kyth Live ISO — Testing"
            NOTES=$(printf 'Built from the `testing` branch. May be unstable.\n\n**Download:** [kyth-live-testing.iso](%s)' "${ISO_URL}")
            PRERELEASE="--prerelease"
          else
            TITLE="Kyth Live ISO — Stable"
            NOTES=$(printf 'Built from the `main` branch.\n\n**Download:** [kyth-live-latest.iso](%s)' "${ISO_URL}")
            PRERELEASE="--latest"
          fi

          gh release delete "${TAG}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${TAG}" \
            --title "${TITLE}" \
            --notes "${NOTES}" \
            ${PRERELEASE}
